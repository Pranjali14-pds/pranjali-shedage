<body>

<h2>Open Console to See Output</h2>

<script>
    let num1 = 10;
    let num2 = 5;

    console.log("Addition:", num1 + num2);

    for (let i = 1; i <= 5; i++) {
        console.log("Count:", i);
    }
</script>
