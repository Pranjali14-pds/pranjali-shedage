<!DOCTYPE html>
<html>
<head>
<title>AJAX Search Suggestion</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

$("#search").keyup(function(){

var txt = $(this).val();

if(txt != "")
{
$.ajax({
url:"search.php",
method:"POST",
data:{query:txt},
success:function(data){
$("#result").html(data);
$("#result").show();
}
});
}
else
{
$("#result").hide();
}

});

});
</script>

</head>

<body>

<h2>Search Suggestion</h2>

<input type="text" id="search" placeholder="Search here">

<div id="result"></div>

</body>
</html>
