<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operations using Switch Case</title>
</head>
<body>

<h2>Arithmetic Operations using Switch Case</h2>

<script>

let num1 = parseFloat(prompt("Enter first number:"));
let num2 = parseFloat(prompt("Enter second number:"));
let operator = prompt("Enter operator (+, -, *, /):");

let result;

switch(operator)
{
    case "+":
        result = num1 + num2;
        document.write("Addition = " + result);
        break;

    case "-":
        result = num1 - num2;
        document.write("Subtraction = " + result);
        break;

    case "*":
        result = num1 * num2;
        document.write("Multiplication = " + result);
        break;

    case "/":
        result = num1 / num2;
        document.write("Division = " + result);
        break;

    default:
        document.write("Invalid Operator");
}

</script>

</body>
</html>
