<!DOCTYPE html>
<html>
<head>
    <title>CSS3 Styles Demo</title>

    <style>
        /* Page Background */
        body {
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
        }

        /* Colors & Fonts */
        .color-text {
            color: #2c3e50;
            font-size: 28px;
            font-weight: bold;
        }

        /* Borders */
        .border-box {
            border: 3px solid #e74c3c;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            background-color: white;
            margin-bottom: 20px;
        }

        /* Background styles */
        .background-box {
            background: url('https://via.placeholder.com/300') no-repeat center;
            background-size: cover;
            height: 150px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Text Effects */
        .text-effects {
            font-size: 30px;
            color: #fff;
            text-shadow: 2px 2px 5px black;
            background-color: #8e44ad;
            padding: 10px;
            border-radius: 8px;
        }

        /* Hover effect */
        .hover-button {
            background-color: #27ae60;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .hover-button:hover {
            background-color: #2ecc71;
            transform: scale(1.1);
        }
    </style>

</head>
<body>

    <h1 class="color-text">CSS3 Styling Example</h1>

    <div class="border-box">
        This box demonstrates borders, border-radius and background color.
    </div>

    <div class="background-box"></div>

    <div class="text-effects">
        Beautiful Text Effects
    </div>

    <br><br>

    <button class="hover-button">Hover Me</button>

</body>
</html>
