<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Voting System</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌈 Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #5f2c82, #49a09d, #ff6ec4);
    background-size: 300% 300%;
    animation: gradientMove 8s infinite alternate;
}

@keyframes gradientMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

/* 🧊 Glass Card */
.container {
    width: 90%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
    animation: fadeIn 1s ease;
}

h1 {
    margin-bottom: 20px;
}

/* 🔘 Buttons */
.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff6ec4, #7873f5);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* 📊 Result Section */
.result {
    margin-top: 20px;
    display: none;
    animation: slideUp 0.6s ease;
}

.bar {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin: 10px 0;
    overflow: hidden;
}

.fill {
    height: 20px;
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    width: 0;
    text-align: right;
    padding-right: 5px;
    font-size: 12px;
}

/* ✨ Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(30px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

</style>
</head>

<body>

<div class="container">
    <h1>Vote for Your Favorite Event 🎉</h1>

    <!-- Buttons -->
    <button class="btn" onclick="vote('hackathon')">Hackathon 💻</button>
    <button class="btn" onclick="vote('gaming')">Gaming 🎮</button>
    <button class="btn" onclick="vote('cultural')">Cultural 🎭</button>

    <!-- Result -->
    <div class="result" id="result">
        <h2>Thank You for Voting! 🙌</h2>

        <div class="bar">
            <div class="fill" id="hackathonBar">0%</div>
        </div>

        <div class="bar">
            <div class="fill" id="gamingBar">0%</div>
        </div>

        <div class="bar">
            <div class="fill" id="culturalBar">0%</div>
        </div>
    </div>
</div>

<script>
let votes = {
    hackathon: 0,
    gaming: 0,
    cultural: 0
};

function vote(option) {
    votes[option]++;

    let total = votes.hackathon + votes.gaming + votes.cultural;

    let hackathonPercent = Math.round((votes.hackathon / total) * 100);
    let gamingPercent = Math.round((votes.gaming / total) * 100);
    let culturalPercent = Math.round((votes.cultural / total) * 100);

    document.getElementById("result").style.display = "block";

    updateBar("hackathonBar", hackathonPercent);
    updateBar("gamingBar", gamingPercent);
    updateBar("culturalBar", culturalPercent);
}

function updateBar(id, percent) {
    let bar = document.getElementById(id);
    bar.style.width = percent + "%";
    bar.innerText = percent + "%";
}
</script>

</body>
</html>
